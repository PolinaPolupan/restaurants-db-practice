services:
  mongo:
    image: mongo
    hostname: mongodb
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
      - db:/data/db
      - configdb:/data/configdb

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    ports:
      - "${POSTGRES_PORT}:5432"

  fastapi:
    build: .
    depends_on:
      - mongo
      - postgres
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${FASTAPI_PORT}:8000"

volumes:
  db:
  configdb:
  pg-data: