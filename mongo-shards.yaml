apiVersion: v1
kind: Service
metadata:
  name: mongo-shard0
spec:
  clusterIP: None
  selector:
    role: mongo-shard0
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongo-shard0
spec:
  serviceName: "mongo-shard0"
  replicas: 1
  selector:
    matchLabels:
      role: mongo-shard0
  template:
    metadata:
      labels:
        role: mongo-shard0
    spec:
      containers:
      - name: shard0
        image: mongo:6
        command:
          - mongod
          - "--shardsvr"
          - "--replSet"
          - "shard0"
          - "--bind_ip_all"
        ports:
        - containerPort: 27018
---
